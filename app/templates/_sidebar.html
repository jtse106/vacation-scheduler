<aside class="sidebar">
  <div class="mini-calendar card">
    <div class="mini-calendar-header">
      <div class="mini-calendar-nav-stack">
        <button id="miniPrevYear" class="icon-button mini-nav-button" type="button" aria-label="Previous year">
          <img class="mini-nav-icon mini-nav-icon-double" src="{{ url_for('static', filename='icons/double-chevron-left.png') }}" alt="" aria-hidden="true" />
        </button>
        <button id="miniPrev" class="icon-button mini-nav-button" type="button" aria-label="Previous month">
          <img class="mini-nav-icon" src="{{ url_for('static', filename='icons/chevron-left.png') }}" alt="" aria-hidden="true" />
        </button>
      </div>
      <div id="miniCalendarLabel"></div>
      <div class="mini-calendar-nav-stack">
        <button id="miniNextYear" class="icon-button mini-nav-button" type="button" aria-label="Next year">
          <img class="mini-nav-icon mini-nav-icon-double" src="{{ url_for('static', filename='icons/double-chevron-right.png') }}" alt="" aria-hidden="true" />
        </button>
        <button id="miniNext" class="icon-button mini-nav-button" type="button" aria-label="Next month">
          <img class="mini-nav-icon" src="{{ url_for('static', filename='icons/chevron-right.png') }}" alt="" aria-hidden="true" />
        </button>
      </div>
    </div>
    <div id="miniCalendarGrid"></div>
  </div>

  {% if nav_user %}
    <button id="openRequestModalInline" class="primary-button large-button sidebar-schedule-button" type="button">Schedule</button>
  {% endif %}

  <nav class="sidebar-links card">
    <a class="{% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Vacation Calendar</a>
    <a class="{% if request.endpoint == 'history' %}active{% endif %}" href="{{ url_for('history') }}">Request History</a>
    <a class="{% if request.endpoint == 'metrics' %}active{% endif %}" href="{{ url_for('metrics') }}">Metrics</a>
    <a class="{% if request.endpoint == 'spring_break' %}active{% endif %}" href="{{ url_for('spring_break') }}">Spring Break</a>
    <a class="{% if request.endpoint == 'holiday_rotation' %}active{% endif %}" href="{{ url_for('holiday_rotation') }}">Holiday Rotation</a>
    {% if nav_user %}
      <a class="{% if request.endpoint == 'holiday_trades' %}active{% endif %}" href="{{ url_for('holiday_trades') }}">Holiday Trades</a>
    {% endif %}
    <a class="{% if request.endpoint == 'legacy_calendars' %}active{% endif %}" href="{{ url_for('legacy_calendars') }}">Legacy Calendars</a>
    <a class="{% if request.endpoint == 'instructions' %}active{% endif %}" href="{{ url_for('instructions') }}">Instructions</a>
    <a class="{% if request.endpoint == 'vacation_guidelines' %}active{% endif %}" href="{{ url_for('vacation_guidelines') }}">Guidelines</a>
    {% if nav_user and nav_user.role == 'admin' %}
      <a class="{% if request.endpoint == 'admin' %}active{% endif %}" href="{{ url_for('admin') }}">Admin Console</a>
    {% endif %}
  </nav>
</aside>

{% extends "base.html" %}
{% block body %}
<main class="centered-shell">
  <section class="auth-card card">
    <span class="page-kicker">Sign In</span>
    <h1>Log in</h1>
    <p class="subtle">Use your physician or admin credentials to manage the shared vacation schedule.</p>
    <form method="post" class="stack">
      <label>
        <span>Username</span>
        <input type="text" name="username" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required />
      </label>
      <button class="primary-button" type="submit">Log in</button>
    </form>
    <p class="subtle top-gap"><a href="{{ url_for('forgot_password') }}">Forgot your password?</a></p>
  </section>
</main>
{% endblock %}

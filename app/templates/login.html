{% extends "base.html" %}
{% block body %}
<main class="centered-shell">
  <section class="auth-card card">
    <span class="page-kicker">Sign In</span>
    <h1>Log in</h1>
    <p class="subtle">Use your physician or admin credentials to manage the shared vacation schedule.</p>
    <form method="post" class="stack">
      <label>
        <span>Username</span>
        <input type="text" name="username" required />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required />
      </label>
      <button class="primary-button" type="submit">Log in</button>
    </form>
    <div class="auth-links top-gap">
      <button id="openForgotPasswordModal" class="text-button auth-link-button" type="button">Forgot password?</button>
    </div>
  </section>
</main>

<div id="forgotPasswordModal" class="modal hidden" aria-hidden="true">
  <div class="modal-card auth-modal-card">
    <div class="modal-header">
      <div>
        <h2>Reset password</h2>
        <p class="subtle">Enter your username or email address and the app will generate a reset link for that account.</p>
      </div>
      <button class="icon-button window-close" data-close-modal="forgotPasswordModal" type="button" aria-label="Close">X</button>
    </div>
    <form id="loginForgotPasswordForm" class="stack">
      <label>
        <span>Username or email</span>
        <input type="text" name="identifier" required />
      </label>
      <button class="primary-button" type="submit">Send reset link</button>
    </form>
  </div>
</div>
{% endblock %}

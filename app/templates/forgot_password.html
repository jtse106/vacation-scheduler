{% extends "base.html" %}
{% block body %}
<main class="centered-shell">
  <section class="auth-card card">
    <span class="page-kicker">Password Reset</span>
    <h1>Forgot password</h1>
    <p class="subtle">Enter your username or email address and the scheduler will queue a reset email.</p>
    <form method="post" class="stack">
      <label>
        <span>Username or email</span>
        <input type="text" name="identifier" required />
      </label>
      <button class="primary-button" type="submit">Send reset link</button>
    </form>
    <p class="subtle top-gap"><a href="{{ url_for('login') }}">Back to login</a></p>
  </section>
</main>
{% endblock %}
